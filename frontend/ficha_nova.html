<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS - Fitxa</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Librería Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

    <!-- Barra de navegación global -->
    <nav class="cabecera-principal" id="navbar">
        <a href="libreria.html" class="cabecera-logo">KRONOS</a>
        <div class="cabecera-acciones">
            <a href="libreria.html" class="enlace-menu">Fitxes</a>
            <div class="contenedor-desplegable">
                <button class="boton-nueva-ficha">+ Nova fitxa</button>
                <div class="contenido-desplegable">
                    <a href="ficha_nova.html?tab=ue">UE</a>
                    <a href="ficha_nova.html?tab=jaciment" class="menu-jac">Jaciment</a>
                    <a href="ficha_nova.html?tab=sector">Sector</a>
                </div>
            </div>
            <div class="contenedor-desplegable">          
                <button class="avatar-cabecera"></button>
                <div class="contenido-desplegable">
                    <a href="profile.html">El meu perfil</a>
                    <a href="index.html">Tancar sessió</a>                  
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenedor principal de la página de detalle -->
    <section id="pagina-detalle" class="contenedor-detalle">
        <a href="#" class="enlace-volver">← Fitxes</a>

        <div class="tarjeta-detalle-principal">

            <!-- FORMULARIO UE -->
            <div id="formulario-ue" class="bloque-pestana">
                <h2 class="nombre-usuario-perfil">Nova UE</h2>
                <div class="rejilla-dos-columnas-detalle">                    
                    <!-- Columna Izquierda UE -->
                    <div class="columna-detalle">
                        <div class="titulo-bloque-interno">Informació bàsica</div>

                        <div class="grupo-rejilla-interno">
                            <div class="campo-formulario-base"><label>UE</label><input type="text" id="i-ue-codi" placeholder="Codi UE"></div>
                            <div class="campo-formulario-base">
                                <label>Sector</label>
                                <select id="i-ue-codiSec">
                                    <option value="">Selecciona un sector...</option>
                                </select>
                            </div>
                            <div class="campo-formulario-base"><label>Datació</label><input type="text" id="i-ue-cronolog" placeholder="Datació"></div>
                            <div class="campo-formulario-base">
                                <label>Tipus UE</label>
                                <select id="i-ue-tipus">
                                    <option>Estrat</option>
                                    <option>Estructura</option>
                                    <option>Retall</option>
                                    <option>Interestrat</option>
                                </select>
                            </div>
                            <div class="campo-formulario-base"><label>Textura</label><input type="text" id="i-ue-text" placeholder="Textura"></div>
                            <div class="campo-formulario-base"><label>Color</label><input type="text" id="i-ue-color" placeholder="Color"></div>
                            <div class="campo-formulario-base"><label>Material</label><input type="text" id="i-ue-mat" placeholder="Material"></div>
                            <div class="campo-formulario-base"><label>Estat conservació</label><input type="text" id="i-ue-estado" placeholder="Estat"></div>
                            
                        </div>                           
                                         
                        <div class="campo-area-texto">
                            <label>Descripció</label>
                            <textarea id="i-ue-descr"></textarea>
                        </div>
                        
                    </div>

                    <!-- Columna Derecha UE -->
                    <div class="columna-detalle">
                        <div class="titulo-bloque-interno">Relacions</div>
                        <div class="campo-formulario-base"><label>Igual a</label><input type="text" class="rel-igual_a"></div>
                        <div class="grupo-rejilla-interno">                           
                            <div class="campo-formulario-base"><label>Cobreix</label><input type="text" class="rel-cobreix"></div>
                            <div class="campo-formulario-base"><label>Cobert per</label><input type="text" class="rel-cobert_per"></div>
                            <div class="campo-formulario-base"><label>Farceix</label><input type="text" class="rel-farceix"></div>
                            <div class="campo-formulario-base"><label>Farcit per</label><input type="text" class="rel-farcit_per"></div>
                            <div class="campo-formulario-base"><label>Talla</label><input type="text" class="rel-talla"></div>
                            <div class="campo-formulario-base"><label>Tallat per</label><input type="text" class="rel-tallat_per"></div>
                            <div class="campo-formulario-base"><label>Recolza</label><input type="text" class="rel-recolza"></div>
                            <div class="campo-formulario-base"><label>Se li recolza</label><input type="text" class="rel-se_li_recolza"></div>
                            <div class="campo-formulario-base"><label>Lliura</label><input type="text" class="rel-lliura"></div>
                            <div class="campo-formulario-base"><label>Se li lliura</label><input type="text" class="rel-se_li_lliura"></div>
                        </div>
                        
                    </div>

                </div>
            </div>

            <!-- FORMULARIO YACIMIENTO -->
            <div id="formulario-jaciment" class="bloque-pestana">
                <h2 class="nombre-usuario-perfil">Nou jaciment</h2>
                <div class="rejilla-dos-columnas-detalle">

                    <!-- Columna Izquierda YACIMIENTO -->
                    <div class="columna-detalle">
                        <div class="titulo-bloque-interno">Informació bàsica</div>
                        <div class="grupo-rejilla-interno">
                            <div class="campo-formulario-base"><label>Nom</label><input type="text" id="i-jac-nom"></div>
                            <div class="campo-formulario-base"><label>Codi</label><input type="text" id="i-jac-codi"></div>
                            <div class="campo-formulario-base"><label>Director/a</label><input type="text" id="i-jac-director"></div>
                        </div>
                        <div >    
                            <div class="campo-formulario-base">
                                <label><b>Coordenades</b></label>
                                <label>Longitud x Latitud x Profunditat </label>
                                <div class="campo-doble-medida">
                                    <input type="number" id="i-jac-long"><!-- longitud: coordenada_x -->
                                    <span>x</span>
                                    <input type="number" id="i-jac-lat"><!-- latitud: coordenada_y -->
                                    <span>x</span>
                                    <input type="number" id="i-jac-prof"><!-- profundidad: coordenada_z -->
                                </div>
                            </div>
                        </div>
                        <div class="campo-area-texto">
                            <label>Descripció</label>
                            <textarea id="i-jac-descr"></textarea>
                        </div>
                        
                    </div>

                    <!-- Columna Derecha YACIMIENTO -->
                    <div class="columna-detalle">    
                        
                        <div class="titulo-bloque-interno">Mapa</div>
                        
                        <div id="map" class="container-map"></div>

                        <div class="contenedor-privacidad">
                            <div class="titulo-privacidad">Permisos</div>
                            <div class="campo-formulario-base">
                                <label>Assignar editors</label>
                                <div class="contenedor-checkbox-pildora" id="contenedor-editors">
                                    
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- FORMULARIO SECTOR -->
            <div id="formulario-sector" class="bloque-pestana">
                <h2 class="nombre-usuario-perfil">Nou sector</h2>
                <div class="rejilla-dos-columnas-detalle">

                    <!-- Columna Izquierda SECTOR -->
                    <div class="columna-detalle">
                        <div class="titulo-bloque-interno">Informació bàsica</div>
                        <div class="grupo-rejilla-interno">
                            <div class="campo-formulario-base"><label>Nom</label><input type="text" id="i-sec-nom"></div>
                            <div class="campo-formulario-base"><label>Codi</label><input type="text" id="i-sec-codi"></div>
                            <div class="campo-formulario-base">
                                <label>Jaciment</label>
                                <select id="i-sec-codiJac">
                                    <option value="">Selecciona un jaciment...</option>
                                </select>
                            </div>
                        </div>
                        <div class="campo-area-texto">
                            <label>Descripció</label>
                            <textarea id="i-sec-descr"></textarea>
                        </div>
                        
                    </div>

                    <!-- Columna Derecha SECTOR -->
                    <div class="columna-detalle">
                        
                    </div>

                </div>
            </div>
            <div class="imatges">
                <div class="titulo-bloque-interno">Imatges</div>
                <article class="caja-arrastrar-soltar dropZone">                             
                    Arrossegar imatges aquí                              
                </article>
            </div>
            <!-- Botones -->
            <div class="contenedor-botones-finales">
                <button class="boton-accion-guardar">Desar</button> <!-- href="libreria.html"  -->
            </div>

        </div>
    </section>
    <!-- imágenes en grande-->
    <div class="modal-imatge" >
        <span class="modal-tancar">✕</span>
        <img src="" id="modal-img">
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/script_ficha_nova.js"></script>

</body>

</html>
