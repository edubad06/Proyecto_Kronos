<!DOCTYPE html>
<html lang="ca">

<head>

    <link rel="stylesheet" href="styles/styles.css">
    <!-- Librería Firebase -->

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<body>

    <section id="pagina-login" class="contenedor-login">

                <label>Contrasenya</label>
                <input type="password" class="passwd">
                <span id="icon-eye" class="material-symbols-outlined">visibility</span>
            </div>

            <div class="opcion-recordar-login">

                <div>
                    <strong>Recorda'm</strong>
                    <div>Desa la sessió en aquest dispositiu</div>
                </div>
            </div> -->

            <button class="boton-enviar-login">Inicia sessió</button>
        </div>
    </section>
    <script src="js/firebase-config.js"></script>
    <script src="js/script_index.js"></script>
</body>

</html>
