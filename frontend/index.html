<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>KRONOS - Login</title>
    <link rel="stylesheet" href="styles/styles.css">
    <!-- Librería Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body class="body-login">
    <section id="pagina-login" class="contenedor-login">
        <div class="tarjeta-login">    
            
            <div class="logo-login">KRONOS</div>
            
            <div class="campo-formulario-base">
                <label>Correu electrònic</label>
                <input type="email" class="correo">
            </div>

            <div class="campo-formulario-base">
                <label>Contrasenya</label>
                <div class="input-eye">
                    <input type="password" class="passwd">
                    <span id="icon-eye" class="material-symbols-outlined">visibility</span>                 
                </div>
            </div>
            
            <button class="boton-enviar-login">Inicia sessió</button>
        </div>
    </section>
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/script_index.js"></script>
</body>

</html>
