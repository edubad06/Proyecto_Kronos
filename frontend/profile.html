<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS - Perfil</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" type="image/x-icon" href="img/favicon-32x32.png">
    <!-- Librería Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

    <nav class="cabecera-principal" id="navbar">
        <a href="libreria.html" class="cabecera-logo">
            <img src="img/logo_2_b.png" alt="KRONOS" style="height: 55px;">
        </a>
        <div class="cabecera-acciones">
            <a href="libreria.html" class="enlace-menu">Fitxes</a>
            <div class="contenedor-desplegable">
                <button class="boton-nueva-ficha">+ Nova fitxa</button>
                <div class="contenido-desplegable">
                    <a href="ficha_nova.html?tab=ue">UE</a>
                    <a href="ficha_nova.html?tab=jaciment" class="menu-jac">Jaciment</a>
                    <a href="ficha_nova.html?tab=sector">Sector</a>
                </div>
            </div>
            <div class="contenedor-desplegable">          
                <button class="avatar-cabecera"></button>
                <div class="contenido-desplegable">
                    <a href="profile.html">El meu perfil</a>
                    <a href="index.html">Tancar sessió</a>                  
                </div>
            </div>
        </div>
    </nav>

    <section id="pagina-perfil" class="contenedor-perfil">
        <div class="tarjeta-perfil">
            
            <h2 class="nombre-usuario-perfil"></h2>

            <div class="rejilla-datos-perfil">
                <div class="columna-perfil">
                    <div class="titulo-bloque-interno">Dades personals</div>
                    <div class="campo-formulario-base">
                        <label>Nom</label>
                        <input type="text" id="input-nom">
                    </div>
                    <div class="campo-formulario-base campo-perfil-inactivo">
                        <label>Correu electrònic</label>
                        <input type="email" id="input-email" readonly> <!-- readonly porque no se cambia -->
                    </div>                   
                </div>
                
                <div class="columna-perfil">
                    <div class="titulo-bloque-interno">Canviar contrasenya</div>
                    <div class="campo-formulario-base">
                        <label>Contrasenya actual</label>
                        <input type="password" id="input-passwd-actual">
                        <a href="#" class="ver-passwd-actual enlace-mostrar">Mostrar contrasenya</a>
                    </div>

                    <div class="campo-formulario-base">
                        <label>Nova contrasenya</label>
                        <input type="password" id="input-passwd-nova">
                        <a href="#" class="ver-passwd-nova enlace-mostrar">Mostrar contrasenya</a>
                    </div>

                    <div class="campo-formulario-base">
                        <label>Repetir nova contrasenya</label>
                        <input type="password" id="input-passwd-repetir">
                        <a href="#" class="ver-passwd-repe enlace-mostrar">Mostrar contrasenya</a>
                    </div>
                </div>
            </div>

            <button class="boton-guardar-perfil">Desar</button>
        </div>
    </section>
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/script_profile.js"></script>
</body>

</html>
